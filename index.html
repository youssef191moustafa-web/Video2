<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفاجأة</title>

<style>
body{
background:#000;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
flex-direction:column;
}

h1{
animation:pulse 1.5s infinite;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:15px;
cursor:pointer;
background:#00ff88;
box-shadow:0 0 20px #00ff88;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

video{
display:none;
max-width:90%;
margin-top:20px;
}

@keyframes pulse{
50%{
transform:scale(1.1);
}
}
</style>
</head>

<body>

<h1>🔥 مفاجأة مستنياك 🔥</h1>

<button onclick="playVideo()">
دوس هنا
</button>

<video id="vid" controls autoplay>
<source src="video.mp4" type="video/mp4">
</video>

<script>
function playVideo(){
document.querySelector("button").style.display="none";
document.querySelector("h1").style.display="none";

let v=document.getElementById("vid");
v.style.display="block";
v.play();
}
</script>

</body>
</html>
